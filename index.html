<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroNet VPN</title>
    <meta name="description" content="AeroNet VPN - Free VPN Configs Aggregator">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --accent: #6c5ce7;
            --accent2: #00cec9;
            --text: #e0e0e0;
            --text-dim: #888;
            --green: #00b894;
            --red: #d63031;
            --orange: #fdcb6e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        header {
            text-align: center;
            padding: 40px 0 30px;
        }
        .logo {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
        }
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,184,148,0.4); }
            70% { box-shadow: 0 0 0 8px rgba(0,184,148,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,184,148,0); }
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 30px 0;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section {
            margin: 30px 0;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }
        .protocols-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .proto-chip {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s;
        }
        .proto-chip:hover {
            border-color: var(--accent);
        }
        .proto-name {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }
        .proto-count {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent2);
        }
        .proto-bar {
            height: 3px;
            border-radius: 2px;
            background: var(--border);
            margin-top: 8px;
            overflow: hidden;
        }
        .proto-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s ease;
        }
        .countries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .country-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            grid-template-rows: auto auto;
            align-items: center;
            gap: 4px 12px;
            transition: border-color 0.2s, transform 0.2s;
            overflow: hidden;
        }
        .country-card:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }
        .country-flag {
            font-size: 28px;
            width: 36px;
            text-align: center;
            grid-row: 1 / 3;
        }
        .country-info {
            min-width: 0;
            overflow: hidden;
        }
        .country-name {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .country-code {
            color: var(--text-dim);
            font-size: 11px;
        }
        .country-count {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent2);
            grid-row: 1 / 3;
            white-space: nowrap;
        }
        .country-protocols {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            grid-column: 2;
            margin-top: 4px;
        }
        .country-proto {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            background: rgba(108,92,231,0.15);
            color: var(--accent);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .sources {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .source-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            flex: 1;
            min-width: 200px;
        }
        .source-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .source-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent2);
        }
        .footer {
            text-align: center;
            padding: 30px 0;
            color: var(--text-dim);
            font-size: 12px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: opacity 0.2s;
        }
        .copy-btn:hover { opacity: 0.8; }
        .sub-link {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            word-break: break-all;
        }
        .sub-link input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        @media (max-width: 600px) {
            .logo { font-size: 32px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .countries-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        function renderProtocols() {
